<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1040" width="1600" height="1040" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffffff" fill-opacity="0.45"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1600" height="1040" fill="#000000"/>

  <!-- server boundary -->
  <rect x="40" y="140" width="1520" height="770" rx="18" fill="#070809" stroke="#88F5C8" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="7 7"/>
  <text x="62" y="172" fill="#88F5C8" fill-opacity="0.85" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" letter-spacing="2">DEDICATED SERVER · DOCKER · CLOUDFLARE TUNNEL · SEGMENTED NETWORKS</text>

  <!-- edges (drawn before nodes so nodes sit on top) -->
  <g stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.6" fill="none">
    <line x1="800" y1="92"  x2="800" y2="194" marker-end="url(#arr)"/>          <!-- user -> api -->
    <line x1="1000" y1="212" x2="1078" y2="200" marker-end="url(#arr)"/>        <!-- api -> cost -->
    <line x1="1000" y1="246" x2="1078" y2="262" marker-end="url(#arr)"/>        <!-- api -> obs -->
    <line x1="800" y1="260" x2="800" y2="298" marker-end="url(#arr)"/>          <!-- api -> orchestrator -->
    <line x1="800" y1="356" x2="800" y2="398" marker-end="url(#arr)"/>          <!-- orchestrator -> specialists -->
    <line x1="760" y1="490" x2="240" y2="588" marker-end="url(#arr)"/>          <!-- specialists -> mcp gw -->
    <line x1="790" y1="490" x2="560" y2="588" marker-end="url(#arr)"/>          <!-- specialists -> router -->
    <line x1="830" y1="490" x2="885" y2="588" marker-end="url(#arr)"/>          <!-- specialists -> corpus -->
    <line x1="860" y1="490" x2="1170" y2="588" marker-end="url(#arr)"/>         <!-- specialists -> graph -->
    <line x1="215" y1="652" x2="215" y2="718" marker-end="url(#arr)"/>          <!-- mcp gw -> tools -->
    <line x1="540" y1="652" x2="550" y2="943" marker-end="url(#arr)"/>          <!-- router -> llms -->
  </g>

  <!-- edge labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#88F5C8" fill-opacity="0.9">
    <text x="814" y="150">AG-UI over SSE</text>
    <text x="814" y="382">Redis event stream</text>
    <text x="372" y="536">MCP</text>
    <text x="556" y="820">OpenRouter · fallback chain</text>
  </g>

  <!-- USER (outside the server boundary) -->
  <rect x="640" y="34" width="320" height="58" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="800" y="69" text-anchor="middle" fill="#ffffff" font-size="20">User · Next.js canvas UI</text>

  <!-- COGNITIVE API -->
  <rect x="600" y="196" width="400" height="64" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="800" y="226" text-anchor="middle" fill="#ffffff" font-size="20">Cognitive API</text>
  <text x="800" y="247" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">Starlette · AG-UI SSE + OpenAI-compat</text>

  <!-- COST TRACKER -->
  <rect x="1080" y="176" width="270" height="50" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="1215" y="199" text-anchor="middle" fill="#ffffff" font-size="16">Cost tracker</text>
  <text x="1215" y="216" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5">per-request budget guardrail</text>

  <!-- OBSERVABILITY -->
  <rect x="1080" y="240" width="270" height="50" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="1215" y="263" text-anchor="middle" fill="#ffffff" font-size="16">Observability</text>
  <text x="1215" y="280" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5">request tracing</text>

  <!-- ORCHESTRATOR -->
  <rect x="660" y="300" width="280" height="56" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="800" y="334" text-anchor="middle" fill="#ffffff" font-size="19">Operator</text>

  <!-- 8 SPECIALIST AGENTS (accent) -->
  <rect x="580" y="400" width="440" height="90" rx="12" fill="#0b0c12" stroke="#88F5C8" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="800" y="436" text-anchor="middle" fill="#ffffff" font-size="20">8 agents (operator + 7 specialists)</text>
  <text x="800" y="459" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">operator · coder · researcher · coder-researcher</text>
  <text x="800" y="477" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5">analyst · productivity · reviewer · evaluator</text>

  <!-- MCP GATEWAY -->
  <rect x="100" y="590" width="230" height="62" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="215" y="627" text-anchor="middle" fill="#ffffff" font-size="17">MCP gateway</text>

  <!-- RESILIENT MODEL ROUTER -->
  <rect x="380" y="590" width="320" height="62" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="540" y="616" text-anchor="middle" fill="#ffffff" font-size="17">Resilient model router</text>
  <text x="540" y="636" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">role → model + fallback</text>

  <!-- PRIVATE CORPUS (data store, purple accent) -->
  <rect x="750" y="590" width="270" height="62" rx="10" fill="#0c0d13" stroke="#C9A8FF" stroke-opacity="0.5"/>
  <text x="885" y="616" text-anchor="middle" fill="#ffffff" font-size="16">Private corpus · RAG</text>
  <text x="885" y="636" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">~27k docs / 294k chunks</text>

  <!-- CONTINUITY GRAPH (data store, purple accent) -->
  <rect x="1070" y="590" width="250" height="62" rx="10" fill="#0c0d13" stroke="#C9A8FF" stroke-opacity="0.5"/>
  <text x="1195" y="627" text-anchor="middle" fill="#ffffff" font-size="16">Continuity graph</text>

  <!-- ~two dozen MCP tool-servers -->
  <rect x="80" y="718" width="270" height="96" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="215" y="748" text-anchor="middle" fill="#ffffff" font-size="16">~two dozen tool-servers</text>
  <text x="215" y="771" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5">memory · knowledge/RAG · exec</text>
  <text x="215" y="789" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5">git · infra · feeds · browser · …</text>

  <!-- MULTIPLE LLM PROVIDERS (outside boundary) -->
  <rect x="400" y="943" width="300" height="60" rx="10" fill="#0b0c12" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="550" y="971" text-anchor="middle" fill="#ffffff" font-size="17">Multiple model providers</text>
  <text x="550" y="990" text-anchor="middle" fill="#C8C5D6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5">role-priced · ends on self-hosted</text>
</svg>
